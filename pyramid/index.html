            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ccaa77'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.font = `bold ${fontSize}px Georgia,serif`;
            const lines = []; let line = '';
            for (const w of words) {
                const t = line ? line + ' ' + w : w;
                if (ctx.measureText(t).width > canvas.width - 60) { lines.push(line); line = w; }
                else { line = t; }
            }
            lines.push(line);
            const lh = fontSize * 1.3;
            let y = (canvas.height - lines.length * lh) / 2 - 15;
            for (const l of lines) { ctx.fillText(l, canvas.width/2, y); y += lh; }
            
            ctx.fillStyle = 'rgba(204,170,119,0.6)'; ctx.font = '14px Georgia,serif';

            ctx.fillStyle = 'rgba(204,170,119,0.15)'; ctx.font = '36px Georgia,serif';
            ctx.fillText('♦', canvas.width/2, canvas.height - 40);
            
            const tex = new THREE.CanvasTexture(canvas); tex.anisotropy = 4;
            
            if (coverUrl) {

                c.width = 512; c.height = 640;
                const ctx = c.getContext('2d');
                ctx.fillStyle = '#f5e8c8'; ctx.fillRect(0, 0, c.width, c.height);
                for (let i = 0; i < 2000; i++) {
                    ctx.fillStyle = `rgba(180,140,100,${Math.random() * 0.06})`;
                    ctx.beginPath(); ctx.arc(Math.random()*c.width, Math.random()*c.height, 1+Math.random()*2, 0, Math.PI*2); ctx.fill();
                }
                ctx.strokeStyle = '#8a6a4a'; ctx.lineWidth = 6;
                ctx.strokeRect(20, 20, c.width-40, c.height-40);
                ctx.fillStyle = '#3a2a1a';
                if (side === 'left') {
                    ctx.font = 'bold 36px Georgia, serif';
                    ctx.fillText(bookInfo.title.length > 22 ? bookInfo.title.substring(0, 22) + '...' : bookInfo.title, 40, 80);
                    ctx.font = 'italic 20px Georgia, serif';
                    ctx.fillText(bookInfo.author, 40, 120);
                    ctx.font = '16px Georgia, serif';
                    const words = bookInfo.desc;
                    const lines = [];
                    let line = '';
                    for (const w of words.split(' ')) {
                        if ((line + w).length > 34) { lines.push(line); line = w + ' '; }
                        else line += w + ' ';
                    }
                    if (line) lines.push(line);
                    lines.forEach((l, i) => ctx.fillText(l, 40, 160 + i * 24));
                } else {
                    ctx.font = 'bold 26px Georgia, serif';
                    ctx.fillText(bc ? bc.author : bookInfo.author, 40, 80);
                    ctx.font = '18px Georgia, serif';
                    if (bc && bc.chapters) {
                        bc.chapters.slice(0, 4).forEach((ch, i) => {
                            ctx.fillText(ch.icon + ' ' + ch.name, 40, 130 + i * 48);
                        });
                    }
                    ctx.font = 'italic 14px Georgia, serif';
                    ctx.fillText('"The equation was always running."', 40, 340);
                }
                return new THREE.MeshStandardMaterial({ map: new THREE.CanvasTexture(c), side: THREE.DoubleSide, roughness: 0.6 });
            };
            
            const leftPage = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.65), pageMat('left'));
            leftPage.position.set(-0.26, 0, 0);
            leftPage.rotation.y = 0.35;
            group.add(leftPage);
            
            const rightPage = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.65), pageMat('right'));
            rightPage.position.set(0.26, 0, 0);
            rightPage.rotation.y = -0.35;
            group.add(rightPage);
            
            // spine
            const spineMat = new THREE.MeshStandardMaterial({ color: 0x8a6a4a, roughness: 0.5 });
            const spine = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.65, 0.02), spineMat);
            group.add(spine);
            
            group.position.set(0, 2.2, 2.8);
            group.scale.set(0, 0, 0);
            scene.add(group);
            return group;
        }
        
        function startReading(book) {
            if (readingState !== 'idle') return;
            readingState = 'flying';
            readingBook = book;
            readingBookOrigMat = book.material;
            
            const idx = draggables.indexOf(book);
            if (idx > -1) draggables.splice(idx, 1);
            dragControls.dispose();
            dragControls = new DragControls(draggables, camera, renderer.domElement);
            dragControls.addEventListener('dragstart', () => { controls.enabled = false; });
            dragControls.addEventListener('dragend', () => { controls.enabled = true; });
            
            if (openBookGroup) { scene.remove(openBookGroup); }
            openBookGroup = buildOpenBook(book.userData);
            
            const bc = pltBooks[book.userData.title] || pltBooks["The Calculation"];
            readTitle.textContent = book.userData.title;
            readAuthor.textContent = `ΓÇö ${bc.author} ΓÇö`;
            readChapters.innerHTML = bc.chapters.map(ch =>
                `<div class="chapter"><span class="icon">${ch.icon}</span><span class="name">${ch.name}</span><p class="desc">${ch.desc}</p></div>`
            ).join('');
            readSummary.textContent = bc.summary;
            if (bc.coverUrl) {
                readCover.src = bc.coverUrl;
                readCover.style.display = 'block';
                readingCard.classList.add('with-cover');
            } else {
                readCover.style.display = 'none';
                readingCard.classList.remove('with-cover');
            }
            const shareUrl = bc.shopifyUrl || 'https://buyasoul.online/';
            if (bc.shopifyUrl) {
                buyBookBtn.href = bc.shopifyUrl;
                buyBookBtn.textContent = `BUY ON BUYaSOUL ${bc.price || ''}`;
            } else {
                buyBookBtn.href = 'https://buyasoul.online/';
                buyBookBtn.textContent = 'BROWSE BUYaSOUL';
            }
            buyBookBtn.style.display = 'inline-block';
            buyBookBtn.target = '_parent';
            const shareText = `${book.userData.title} — ${bc.author}. Part of the PLT Doctrine.`;
            shareBsky.href = `https://bsky.app/intent/compose?text=${encodeURIComponent(shareText + ' ' + shareUrl)}`;
            shareBsky.style.display = 'inline-block';
            shareX.href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText + ' ' + shareUrl)}`;
            shareX.style.display = 'inline-block';
            shareCopy.style.display = 'inline-block';
            shareCopy.onclick = () => {
                navigator.clipboard.writeText(shareUrl).then(() => {
                    shareCopy.textContent = 'Copied!';
                    shareCopy.classList.add('copied');
                    setTimeout(() => { shareCopy.textContent = 'Copy Link'; shareCopy.classList.remove('copied'); }, 2000);
                });
            };
        }
        
        closeBookBtn.addEventListener('click', () => {
            if (readingState !== 'open') return;
            readingState = 'returning';
            readingOverlay.classList.remove('active');
            readingCard.classList.remove('with-cover');
        });
        
        function updateBookReading() {
            if (!readingBook) return;
            
            if (readingState === 'flying') {
                const pos = readingBook.position;
                pos.lerp(readTargetPos, readFlySpeed);
                // also move toward camera a bit
                const targetScale = 1.5;
                _readScale.set(targetScale, targetScale, targetScale);
                readingBook.scale.lerp(_readScale, 0.05);
                // face camera roughly
                readingBook.rotation.y += 0.02;
                readingBook.rotation.x += 0.005;
                
                if (pos.distanceTo(readTargetPos) < 0.1) {
                    readingState = 'open';
                    readingBook.visible = false;
                    readingOverlay.classList.add('active');
                    // animate open book scaling in
                }
            }
            
            if (readingState === 'open' && openBookGroup) {
                const sc = openBookGroup.scale.x;
                const target = 1.0;
                if (sc < target - 0.01) {
                    const ns = Math.min(target, sc + 0.03);
                    openBookGroup.scale.set(ns, ns, ns);
                    openBookGroup.rotation.y += 0.003;
                }
            }
            
            if (readingState === 'returning') {
                if (openBookGroup) {
                    const sc = openBookGroup.scale.x;
                    if (sc > 0.01) {
                        openBookGroup.scale.set(sc * 0.92, sc * 0.92, sc * 0.92);
                        openBookGroup.rotation.y += 0.01;
                    } else {
                        scene.remove(openBookGroup);
                        openBookGroup.traverse(c => { if (c.isMesh) { c.geometry.dispose(); if (c.material) { if (c.material.map) c.material.map.dispose(); c.material.dispose(); } } });
                        openBookGroup = null;
                    }
                }
                
                readingBook.visible = true;
                const shelfPos = readingBook.userData.shelfPos;
                readingBook.position.lerp(shelfPos, 0.06);
                readingBook.scale.lerp(_readReturnScale, 0.05);
                readingBook.rotation.y += 0.01;
                readingBook.rotation.x *= 0.95;
                
                if (readingBook.position.distanceTo(shelfPos) < 0.1) {
                    readingBook.position.copy(shelfPos);
                    readingBook.scale.set(1, 1, 1);
                    readingBook.rotation.set(0, 0, 0);
                    readingState = 'idle';
                    buyBookBtn.style.display = 'none';
                    draggables.push(readingBook);
                    readingBook = null;
                }
            }
        }
        
        // ========== SOUL WHISPER SYSTEM ==========
        const whisperContainer = document.getElementById('whisper-container');
        
        function spawnWhisper(worldPos, text) {
            // project 3D position to screen
            const vec = worldPos.clone();
            vec.y += 0.8; // float above soul
            vec.project(camera);
            const x = (vec.x * 0.5 + 0.5) * window.innerWidth;
            const y = (-vec.y * 0.5 + 0.5) * window.innerHeight;
            
            const el = document.createElement('div');
            el.className = 'whisper';
            el.textContent = text;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.color = `hsl(${Math.random() * 60 + 20}, 80%, 70%)`;
            whisperContainer.appendChild(el);
            
            // trigger animation
            requestAnimationFrame(() => el.classList.add('fade-in'));
            setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 4000);
        }
        
        // mouse proximity for souls
        const mouseWorldPos = new THREE.Vector3();
        const mouseSoulThreshold = 2.5;
        
        // ========== CLICK / INTERACTION SYSTEM ==========
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();
        let mouseDownPos2 = { x: 0, y: 0 };
        let mouseDownTarget = null;
        let interactionDragging = false;
        // throttled pointermove
        let lastPointerMove = 0;
        const pointerMoveThrottle = 50; // ms
        const _soulMeshes = souls.map(s => s.obj.children[0]);
        const _movePlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
        const _moveIntersect = new THREE.Vector3();
        
        function getClickTargets() {
            const targets = [...books, ..._soulMeshes];
            if (!isInside) targets.push(portalPlane);
            if (avatar && !isInside) targets.push(avatar);
            return targets;
        }
        
        const allInteriorHits = () => {
            const list = [];
            interiorGroup.children.forEach(c => {
                if (c.children) c.children.forEach(gc => list.push(gc));
                list.push(c);
            });
            return list;
        };
        
        renderer.domElement.addEventListener('pointerdown', (e) => {
            mouseDownPos2.x = e.clientX;
            mouseDownPos2.y = e.clientY;
            interactionDragging = false;
            const rect = renderer.domElement.getBoundingClientRect();
            pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(pointer, camera);
            const targets = isInside ? allInteriorHits() : getClickTargets();
            const hits = raycaster.intersectObjects(targets, false);
            mouseDownTarget = hits.length > 0 ? hits[0].object : null;
        });
        
        renderer.domElement.addEventListener('pointerup', (e) => {
            const dist = Math.hypot(e.clientX - mouseDownPos2.x, e.clientY - mouseDownPos2.y);
            if (dist > 5) { interactionDragging = true; return; }
            if (interactionDragging || !mouseDownTarget) return;
            if (readingState !== 'idle') return;
            
            // pyramid enter/exit
            if (isInside) {
                let hitBook = false;
                bookGroupInt.children.forEach(c => {
                    if (mouseDownTarget === c) { hitBook = true; }
                    if (c.children) c.children.forEach(cc => { if (mouseDownTarget === cc) hitBook = true; });
                });
                if (hitBook) {
                    alert("≡ƒôû THE CALCULATION ┬╖ Profit ┬╖ Love ┬╖ Tax\n\n\"Every move in life is a three-part equation. Whether you calculate it or not.\"");
                } else {
                    exitPyramid();
                }
                return;
            }
            if (mouseDownTarget === portalPlane) {
                enterPyramid();
                return;
            }
            
            // check books
            const bookHit = mouseDownTarget.userData && mouseDownTarget.userData.isBook;
            if (bookHit) {
                startReading(mouseDownTarget);
                return;
            }
            
            // check souls
            for (const s of souls) {
                if (s.obj.children[0] === mouseDownTarget) {
                    const quote = pltQuotes[Math.floor(Math.random() * pltQuotes.length)];
                    spawnWhisper(s.obj.position, quote);
                    break;
                }
            }
            
            // check avatar
            if (avatar) {
                let isAvatarHit = mouseDownTarget === avatar;
                if (!isAvatarHit) {
                    avatar.traverse(c => { if (c === mouseDownTarget) isAvatarHit = true; });
                }
                if (isAvatarHit) {
                    const quote = pltQuotes[Math.floor(Math.random() * pltQuotes.length)];
                    spawnWhisper(avatar.position, quote);
                }
            }
        });
        
        // cursor hover (throttled)
        renderer.domElement.addEventListener('pointermove', (e) => {
            const now = performance.now();
            if (now - lastPointerMove < pointerMoveThrottle) return;
            lastPointerMove = now;
            const rect = renderer.domElement.getBoundingClientRect();
            pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(pointer, camera);
            const bookHits = raycaster.intersectObjects(books, false);
            const soulHits = raycaster.intersectObjects(_soulMeshes, false);
            let avatarHits = { length: 0 };
            if (avatar) avatarHits = raycaster.intersectObject(avatar, true);
            const cursor = bookHits.length > 0 ? 'pointer' : (soulHits.length > 0 || avatarHits.length > 0) ? 'grab' : 'default';
            renderer.domElement.style.cursor = cursor;
            
            // update mouse world position for soul proximity
            const hitPlane = raycaster.ray.intersectPlane(_movePlane, _moveIntersect);
            if (hitPlane) mouseWorldPos.copy(_moveIntersect);
        });
        
        // update hint element ref
        const hintEl = document.getElementById('controls-hint');
        
        // close overlay on bg click
        document.getElementById('reading-bg').addEventListener('click', () => {
            if (readingState === 'open') {
                closeBookBtn.click();
            }
        });
        
        // ESC key: close reading overlay or exit pyramid
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && readingState === 'open') {
                closeBookBtn.click();
            } else if (e.key === 'Escape' && isInside) {
                exitPyramid();
            }
        });
        
        // Exit button
        const exitBtn = document.createElement('button');
        exitBtn.textContent = '≡ƒÅ¢∩╕Å EXIT PYRAMID';
        exitBtn.style.position = 'absolute';
        exitBtn.style.bottom = '20px';
        exitBtn.style.right = '20px';
        exitBtn.style.background = '#2c1a0e';
        exitBtn.style.color = '#efdba1';
        exitBtn.style.border = '1px solid #b87a3c';
        exitBtn.style.padding = '8px 16px';
        exitBtn.style.borderRadius = '40px';
        exitBtn.style.cursor = 'pointer';
        exitBtn.style.zIndex = '20';
        exitBtn.style.display = 'none';
        document.body.appendChild(exitBtn);
        exitBtn.addEventListener('click', exitPyramid);
        
        // ========== ANIMATION ==========
        let time = 0, lastTime = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(0.033, (performance.now() - lastTime) / 1000);
            lastTime = performance.now();
            time += dt;
            
            // --- souls orbiting & bobbing + mouse reaction ---
            souls.forEach(s => {
                if (s.obj.userData.isDragging) return;
                // mouse proximity: flee from cursor
                const dx = s.obj.position.x - mouseWorldPos.x;
                const dz = s.obj.position.z - mouseWorldPos.z;
                const dist = Math.sqrt(dx*dx + dz*dz);
                let flee = 0;
                if (dist < mouseSoulThreshold && dist > 0.01) {
                    flee = (1 - dist / mouseSoulThreshold) * 2.0;
                    s.angle += (dx / dist) * flee * 0.008;
                }
                
                s.angle += 0.006;
                s.obj.position.x = Math.cos(s.angle) * s.radius;
                s.obj.position.z = Math.sin(s.angle) * s.radius;
                s.obj.position.y = s.yOff + Math.sin(time * s.ySpeed + s.yPhase) * 0.25;
                const sc = 1 + Math.sin(time * 2.5 + s.angle) * 0.08;
                s.obj.children[0].scale.set(sc, sc, sc);
            });
            
            // --- avatar bob ---
            if (avatar) {
                const bobY = Math.sin(time * 1.2) * 0.04;
                avatar.position.y = bobY;
                avatar.rotation.y += 0.002;
                // glow ring spin
                avatar.children.forEach(c => {
                    if (c.isMesh && c.geometry && c.geometry.type === 'RingGeometry') {
                        c.rotation.z += 0.01;
                        c.rotation.x += 0.003;
                        c.material.opacity = 0.15 + Math.sin(time * 1.5 + c.position.x) * 0.1;
                    }
                });
            }
            
            // --- rotate stars, wisps, dust ---
            stars.rotation.y += 0.0003;
            stars.rotation.x += 0.0002;
            wisps.rotation.y += 0.0015;
            dust.rotation.y += 0.004;
            
            // --- rotate planets ---
            planets.forEach((p, i) => {
                p.rotation.x += 0.003 + i * 0.0005;
                p.rotation.y += 0.004 + i * 0.0003;
            });
            rings.forEach(r => { r.rotation.z += 0.008; });
            
            // --- rotate galaxies ---
            galaxies.forEach((g, i) => {
                g.rotation.y += 0.00015 * (1 + i * 0.2) * (i % 2 === 0 ? 1 : -1);
                g.rotation.x += 0.00005 * (i % 2 === 0 ? 1 : -1);
            });
            
            // --- rotate nebulae ---
            nebulae.forEach(n => {
                n.sprite.material.rotation += n.rotSpeed;
            });
            
            // --- animate embers ---
            const emberPosAttr = embers.geometry.attributes.position;
            const epos = emberPosAttr.array;
            for (let i = 0; i < emberCount; i++) {
                const d = emberData[i];
                epos[i*3+1] += Math.sin(time * d.speed + d.phase) * 0.004;
                epos[i*3] += d.driftX * 0.002;
                epos[i*3+2] += d.driftZ * 0.002;
                // wrap all axes to keep embers in bounds
                if (Math.abs(epos[i*3+1] - d.origY) > 3 || Math.abs(epos[i*3] - d.origX) > 4 || Math.abs(epos[i*3+2] - d.origZ) > 4) {
                    epos[i*3] = d.origX + (Math.random() - 0.5) * 2;
                    epos[i*3+1] = d.origY;
                    epos[i*3+2] = d.origZ + (Math.random() - 0.5) * 2;
                }
            }
            emberPosAttr.needsUpdate = true;
            
            // --- floating pages ---
            pages.forEach(p => {
                p.mesh.position.x += p.speedX;
                p.mesh.position.y += Math.sin(time * 1.2) * 0.002;
                p.mesh.position.z += p.speedZ;
                p.mesh.rotation.z += 0.015;
                p.mesh.rotation.x += 0.008;
                if (Math.abs(p.mesh.position.x) > 6) p.mesh.position.x = -p.orig.x * 0.8;
                if (p.mesh.position.y > 4) p.mesh.position.y = 0.2;
            });
            
            // --- orbs drift ---
            orbs.forEach((orb, i) => {
                orb.position.x += Math.sin(time * 0.6 + i) * 0.002;
                orb.position.y += Math.cos(time * 0.5 + i) * 0.002;
            });
            
            // --- book reading animation ---
            updateBookReading();
            
            // --- rune pulse animation ---
            runes.forEach(rune => {
                const pulse = 0.5 + Math.sin(time * 2.5 + rune.position.x) * 0.4;
                rune.material.opacity = pulse;
                const s = 1 + Math.sin(time * 3 + rune.position.x) * 0.2;
                rune.scale.set(s, s, s);
            });
            
            // --- portal ripple animation ---
            if (portalUniforms) portalUniforms.uTime.value = time;
            
            // --- pulse pyramid glow ---
            pyramidGlow.intensity = 0.9 + Math.sin(time * 1.8) * 0.3;
            capstone.material.emissiveIntensity = 0.5 + Math.sin(time * 2.2) * 0.2;
            
            // --- star twinkle (multi-frequency compound) ---
            const tw1 = Math.sin(time * 0.8) * 0.5 + 0.5;
            const tw2 = Math.sin(time * 1.7) * 0.3 + 0.3;
            const tw3 = Math.sin(time * 2.3) * 0.2 + 0.2;
            const twinkle = (tw1 + tw2 + tw3) / 3;
            stars.material.size = 0.18 * (0.7 + twinkle * 0.3);
            stars.material.opacity = 0.6 + twinkle * 0.25;
            
            // --- bloom pulse ---
            bloomPass.strength = 1.1 + Math.sin(time * 0.4) * 0.15;
            
            hintEl.textContent = isInside
                ? '≡ƒôû Click the book | Click wall or press ESC to exit'
                : '≡ƒû▒∩╕Å Drag objects | Click books | Click souls | Click the guardian | Click pyramid door to enter';
            
            controls.update();
            effectComposer.render();
        }
        animate();
        
        // ========== RESIZE ==========
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            effectComposer.setSize(window.innerWidth, window.innerHeight);
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('Mystical Library: click books to read PLT content, click souls for whispers, drag objects');
    </script>
</body>
</html>
