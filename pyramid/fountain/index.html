<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pyramid Water Fountain | BUYaSOUL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Times New Roman', Times, serif;
            background: #010008;
            color: #f0e6d0;
        }
        #canvas-container {
            display: block;
            width: 100%;
            height: 100vh;
        }
        .form-section {
            position: relative;
            z-index: 20;
            width: 100%;
            padding: 60px 20px 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at center top, rgba(15,8,25,0.95), #010008 70%);
        }
        .vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            background: radial-gradient(circle at center, transparent 55%, rgba(0,0,0,0.8) 100%);
        }
        .form-container {
            width: 100%; max-width: 380px;
            background: rgba(20, 10, 35, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 24px; padding: 28px 32px;
            text-align: center;
            box-shadow: 0 0 60px rgba(0, 212, 255, 0.1);
            transition: opacity 0.6s ease;
            margin: 0 auto;
        }
        .form-container h1 {
            font-size: 1.3rem; margin-bottom: 0.2rem;
            letter-spacing: 2px; font-weight: normal;
            background: linear-gradient(135deg, #00d4ff, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .form-container p { font-size: 0.75rem; margin-bottom: 0.8rem; opacity: 0.7; }
        .form-group { display: flex; flex-direction: column; gap: 16px; }
        input {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 60px; padding: 10px 16px;
            font-size: 0.85rem; color: #ffeedd;
            outline: none; transition: all 0.3s;
            text-align: center; font-family: monospace;
        }
        input:focus { border-color: #00d4ff; box-shadow: 0 0 20px rgba(0,212,255,0.3); }
        button {
            background: linear-gradient(135deg, #00d4ff, #8b5cf6);
            border: none; border-radius: 60px; padding: 10px;
            font-size: 1rem; font-weight: bold;
            color: #0a0515; cursor: pointer;
            transition: 0.2s; font-family: inherit; letter-spacing: 2px;
        }
        button:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px rgba(0,212,255,0.4);
        }
        .success-message {
            display: none; font-size: 0.9rem; margin-top: 10px;
            color: #88ffcc; text-shadow: 0 0 10px #00ffaa;
        }
        .success-message.show { display: block; }
        .free-gift {
            display: none; margin-top: 10px; padding: 8px;
            background: rgba(255,215,0,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 12px; text-align: center;
        }
        .free-gift.show { display: block; animation: fadeInUp 0.6s ease; }
        .free-gift a {
            display: inline-block; margin-top: 8px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000; border: none; border-radius: 30px;
            padding: 6px 18px; font-size: 12px; font-weight: bold;
            text-decoration: none; font-family: inherit;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .free-gift a:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,215,0,0.4); }
        .attribution {
            position: absolute; bottom: 12px; left: 50%;
            transform: translateX(-50%);
            font-size: 10px; z-index: 5;
            background: rgba(0,0,0,0.4);
            padding: 4px 14px; border-radius: 20px;
            pointer-events: none; font-family: monospace;
            color: #665577;
        }
        #canvas-container { position: relative; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 600px) { .form-container { padding: 16px 14px; } .form-container h1 { font-size: 1.1rem; } }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div class="vignette"></div>
        <div class="attribution">Pyramid of the Living Fountain</div>
    </div>

    <div class="form-section">
        <div class="form-container" id="formContainer">
            <h1>DRINK FROM THE FOUNTAIN</h1>
            <p>Enter your email to receive living water</p>
            <div class="form-group">
                <input type="email" id="emailInput" placeholder="your@soul.com" autocomplete="email">
                <button id="submitBtn">DRINK</button>
            </div>
            <div class="success-message" id="successMsg">
                Your soul is now watered. Check your inbox.
            </div>
            <div class="free-gift" id="freeGift">
                Claim your free soul gift:<br>
                <a href="free-soul-gift.gif" download target="_blank">Download Free GIF</a>
            </div>
        </div>
    </div>

    <!-- Hidden iframe for cross-origin form POST to Shopify -->
    <iframe name="hidden-frame" style="display:none"></iframe>
    <form id="hiddenForm" action="https://buyasoul.myshopify.com/contact#contact_form" method="POST" target="hidden-frame" style="display:none">
        <input type="email" name="contact[email]" id="hiddenEmail">
        <input type="hidden" name="contact[body]" value="New signup from Pyramid Water Fountain on buyasoul.online">
    </form>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010008);
        scene.fog = new THREE.FogExp2(0x010008, 0.008);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2.2, 4.5);
        camera.lookAt(0, 1.2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Postprocessing
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.3, 0.6);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.9;
        bloomPass.radius = 0.5;

        const vignetteShader = {
            uniforms: { tDiffuse: { value: null }, intensity: { value: 0.75 } },
            vertexShader: 'varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }',
            fragmentShader: 'uniform sampler2D tDiffuse; uniform float intensity; varying vec2 vUv; void main() { vec4 color = texture2D(tDiffuse, vUv); float dist = length(vUv - 0.5); float vignette = 1.0 - smoothstep(0.2, 0.8, dist) * intensity; gl_FragColor = vec4(color.rgb * vignette, color.a); }'
        };
        const vignettePass = new ShaderPass(vignetteShader);
        vignettePass.renderToScreen = true;

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        composer.addPass(vignettePass);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.target.set(0, 1.2, 0);
        controls.maxPolarAngle = Math.PI / 2.2;

        // Lighting
        scene.add(new THREE.AmbientLight(0x221133, 0.5));
        scene.add(new THREE.HemisphereLight(0x443366, 0x332211, 0.6));
        const mainLight = new THREE.DirectionalLight(0xffcc99, 0.9);
        mainLight.position.set(2, 5, 3);
        mainLight.castShadow = true;
        scene.add(mainLight);
        scene.add(new THREE.PointLight(0x8866ff, 0.5).position.set(-1, 2, -3));
        const fountainGlow = new THREE.PointLight(0x00aaff, 0.8);
        fountainGlow.position.set(0, 1.2, 0);
        scene.add(fountainGlow);

        // Stars
        const starCount = 1800;
        const starGeo = new THREE.BufferGeometry();
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 400;
            starPositions[i*3+1] = (Math.random() - 0.5) * 150;
            starPositions[i*3+2] = (Math.random() - 0.5) * 150 - 80;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending })));

        // Nebula sprites
        const nebulaGroup = new THREE.Group();
        const nebulaTex = (() => {
            const c = document.createElement('canvas'); c.width = 32; c.height = 32;
            const ctx = c.getContext('2d');
            ctx.fillStyle = '#88aaff'; ctx.beginPath(); ctx.arc(16, 16, 14, 0, 2 * Math.PI); ctx.fill();
            ctx.fillStyle = '#ff88cc'; ctx.beginPath(); ctx.arc(16, 16, 8, 0, 2 * Math.PI); ctx.fill();
            return new THREE.CanvasTexture(c);
        })();
        for (let i = 0; i < 60; i++) {
            const mat = new THREE.SpriteMaterial({
                map: nebulaTex,
                color: new THREE.Color().setHSL(0.65 + Math.random()*0.2, 0.8, 0.5),
                blending: THREE.AdditiveBlending, transparent: true
            });
            const sprite = new THREE.Sprite(mat);
            sprite.scale.set(0.8 + Math.random() * 1.2, 0.8 + Math.random() * 1.2, 1);
            sprite.position.set((Math.random() - 0.5) * 20, (Math.random() - 0.5) * 8, (Math.random() - 0.5) * 20 - 10);
            nebulaGroup.add(sprite);
        }
        scene.add(nebulaGroup);

        // Pyramid
        const pyramidGroup = new THREE.Group();
        const pyramidGeom = new THREE.CylinderGeometry(0, 3.8, 5.2, 4);
        const pyramidMat = new THREE.MeshPhongMaterial({ color: 0xc9aa77, emissive: 0x331100, transparent: true, opacity: 0.25, side: THREE.DoubleSide });
        const pyramidMesh = new THREE.Mesh(pyramidGeom, pyramidMat);
        pyramidMesh.position.y = 2.0;
        pyramidGroup.add(pyramidMesh);

        const wireframe = new THREE.LineSegments(new THREE.EdgesGeometry(pyramidGeom), new THREE.LineBasicMaterial({ color: 0xffaa66 }));
        wireframe.position.copy(pyramidMesh.position);
        pyramidGroup.add(wireframe);

        const pillarMat = new THREE.MeshStandardMaterial({ color: 0xccaa77, emissive: 0x552200 });
        [[-2.4,1.5,-2.4],[2.4,1.5,-2.4],[-2.4,1.5,2.4],[2.4,1.5,2.4]].forEach(p => {
            const pillar = new THREE.Mesh(new THREE.BoxGeometry(0.15, 3.2, 0.15), pillarMat);
            pillar.position.set(p[0], p[1], p[2]);
            pyramidGroup.add(pillar);
        });
        scene.add(pyramidGroup);

        // Basin
        const basinGroup = new THREE.Group();
        const basin = new THREE.Mesh(new THREE.CylinderGeometry(1.6, 1.8, 0.35, 8), new THREE.MeshStandardMaterial({ color: 0xaa9977, roughness: 0.7, metalness: 0.2 }));
        basin.position.y = 0.2;
        basinGroup.add(basin);

        const waterMat = new THREE.MeshStandardMaterial({ color: 0x2a6f8f, emissive: 0x0055aa, emissiveIntensity: 0.4, transparent: true, opacity: 0.85 });
        const waterDisc = new THREE.Mesh(new THREE.CylinderGeometry(1.4, 1.4, 0.08, 32), waterMat);
        waterDisc.position.y = 0.38;
        basinGroup.add(waterDisc);

        const rimRing = new THREE.Mesh(new THREE.TorusGeometry(1.55, 0.05, 16, 50), new THREE.MeshStandardMaterial({ color: 0x00ccff, emissive: 0x0088aa, emissiveIntensity: 0.6 }));
        rimRing.position.y = 0.42;
        rimRing.rotation.x = Math.PI / 2;
        basinGroup.add(rimRing);
        scene.add(basinGroup);

        // Crystal orb
        const crystalGroup = new THREE.Group();
        crystalGroup.add(new THREE.Mesh(new THREE.IcosahedronGeometry(0.35, 0), new THREE.MeshStandardMaterial({ color: 0x88ddff, emissive: 0x2266cc, emissiveIntensity: 0.8, metalness: 0.9 })));
        crystalGroup.add(new THREE.Mesh(new THREE.SphereGeometry(0.45, 16, 16), new THREE.MeshBasicMaterial({ color: 0x88aaff, transparent: true, opacity: 0.2, side: THREE.BackSide })));
        crystalGroup.position.set(0, 1.55, 0);
        scene.add(crystalGroup);

        // Idle particles
        const particleCount = 1800;
        const particlePositions = new Float32Array(particleCount * 3);
        const particleVelocities = [];
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 1.5;
            particlePositions[i*3+1] = Math.random() * 1.2 + 0.4;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 1.5;
            particleVelocities.push({ y: Math.random() * 0.02 + 0.01, x: (Math.random() - 0.5)*0.008, z: (Math.random() - 0.5)*0.008 });
        }
        const particleGeom = new THREE.BufferGeometry();
        particleGeom.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particles = new THREE.Points(particleGeom, new THREE.PointsMaterial({ color: 0x00d4ff, size: 0.04, blending: THREE.AdditiveBlending }));
        scene.add(particles);

        // Dust motes
        const dustCount = 800;
        const dustGeom = new THREE.BufferGeometry();
        const dustPos = new Float32Array(dustCount * 3);
        for (let i = 0; i < dustCount; i++) {
            dustPos[i*3] = (Math.random() - 0.5) * 6;
            dustPos[i*3+1] = Math.random() * 4.5;
            dustPos[i*3+2] = (Math.random() - 0.5) * 5;
        }
        dustGeom.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
        scene.add(new THREE.Points(dustGeom, new THREE.PointsMaterial({ color: 0xffaa88, size: 0.03, transparent: true, opacity: 0.4 })));

        // Eruption system
        let isErupting = false;
        let eruptionTimer = 0;
        let eruptionSystem = null;

        function createEruptionBurst() {
            const cnt = 4000;
            const geom = new THREE.BufferGeometry();
            const pos = new Float32Array(cnt * 3);
            const vel = [];
            for (let i = 0; i < cnt; i++) {
                pos[i*3] = (Math.random() - 0.5) * 2.5;
                pos[i*3+1] = Math.random() * 0.8 + 0.3;
                pos[i*3+2] = (Math.random() - 0.5) * 2.5;
                vel.push({ x: (Math.random() - 0.5)*0.15, y: Math.random() * 0.25 + 0.1, z: (Math.random() - 0.5)*0.15 });
            }
            geom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const sys = new THREE.Points(geom, new THREE.PointsMaterial({ color: 0xff88cc, size: 0.09, blending: THREE.AdditiveBlending }));
            scene.add(sys);
            return { sys, velocities: vel, count: cnt };
        }

        // Email form logic
        const formContainer = document.getElementById('formContainer');
        const emailInput = document.getElementById('emailInput');
        const submitBtn = document.getElementById('submitBtn');
        const successMsg = document.getElementById('successMsg');
        const freeGift = document.getElementById('freeGift');
        const hiddenForm = document.getElementById('hiddenForm');
        const hiddenEmail = document.getElementById('hiddenEmail');

        // Bot notification endpoint — send to Mastodon bot
        const BOT_WEBHOOK = 'https://buyasoul.social/api/notify'; // placeholder — wire your bot here

        function triggerEruption() {
            if (isErupting) return;
            isErupting = true;
            eruptionTimer = 5.0;

            if (eruptionSystem) { scene.remove(eruptionSystem.sys); }
            eruptionSystem = createEruptionBurst();

            fountainGlow.intensity = 2.5;
            fountainGlow.color.setHex(0xff66aa);
            pyramidMat.emissive.setHex(0x884400);
            pyramidMat.emissiveIntensity = 0.8;
            setTimeout(() => { pyramidMat.emissiveIntensity = 0.2; }, 800);

            const flash = new THREE.PointLight(0xffaa88, 1.5);
            flash.position.set(0, 1.5, 0);
            scene.add(flash);
            setTimeout(() => scene.remove(flash), 600);

            waterMat.emissiveIntensity = 1.2;
            setTimeout(() => { waterMat.emissiveIntensity = 0.4; }, 2000);
        }

        async function notifyBot(email) {
            try {
                await fetch(BOT_WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, source: 'pyramid-fountain', timestamp: new Date().toISOString() })
                });
            } catch (e) {
                // Bot not wired yet — silently succeed
            }
        }

        function handleSubmit(e) {
            e.preventDefault();
            const email = emailInput.value.trim();
            if (!email || !email.includes('@')) {
                alert('Please enter a valid email address.');
                return;
            }

            // Hidden iframe POST to Shopify contact form (no CORS)
            hiddenEmail.value = email;
            hiddenForm.submit();

            // Trigger 3D eruption
            triggerEruption();

            // Notify bot (async, best-effort)
            notifyBot(email);

            // Show success + free gift
            formContainer.querySelector('h1').style.display = 'none';
            formContainer.querySelector('p').style.display = 'none';
            document.querySelector('.form-group').style.display = 'none';
            successMsg.classList.add('show');
            freeGift.classList.add('show');
        }

        submitBtn.addEventListener('click', handleSubmit);
        emailInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSubmit(e); });

        // Animation
        let time = 0;
        let rippleTime = 0;

        function updateIdleParticles() {
            const pos = particles.geometry.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                pos[i*3+1] += particleVelocities[i].y;
                if (pos[i*3+1] > 1.4) {
                    pos[i*3+1] = 0.3;
                    pos[i*3] = (Math.random() - 0.5) * 1.4;
                    pos[i*3+2] = (Math.random() - 0.5) * 1.4;
                }
                pos[i*3] += particleVelocities[i].x;
                pos[i*3+2] += particleVelocities[i].z;
                const rad = Math.hypot(pos[i*3], pos[i*3+2]);
                if (rad > 1.3) { pos[i*3] *= 0.98; pos[i*3+2] *= 0.98; }
            }
            particles.geometry.attributes.position.needsUpdate = true;
        }

        function updateEruption() {
            if (!isErupting) return;
            eruptionTimer -= 0.016;
            if (eruptionTimer <= 0) {
                isErupting = false;
                if (eruptionSystem) { scene.remove(eruptionSystem.sys); eruptionSystem = null; }
                fountainGlow.intensity = 0.8;
                fountainGlow.color.setHex(0x00aaff);
                pyramidMat.emissiveIntensity = 0.1;
                return;
            }
            if (eruptionSystem) {
                const pos = eruptionSystem.sys.geometry.attributes.position.array;
                const vels = eruptionSystem.velocities;
                for (let i = 0; i < eruptionSystem.count; i++) {
                    pos[i*3] += vels[i].x;
                    pos[i*3+1] += vels[i].y;
                    pos[i*3+2] += vels[i].z;
                    vels[i].y -= 0.008;
                    if (pos[i*3+1] < 0.1 || pos[i*3+1] > 5.5) {
                        pos[i*3] = (Math.random() - 0.5) * 2.5;
                        pos[i*3+1] = 0.5;
                        pos[i*3+2] = (Math.random() - 0.5) * 2.5;
                        vels[i].x = (Math.random() - 0.5)*0.12;
                        vels[i].y = Math.random() * 0.2 + 0.15;
                        vels[i].z = (Math.random() - 0.5)*0.12;
                    }
                }
                eruptionSystem.sys.geometry.attributes.position.needsUpdate = true;
            }
        }

        let mouseX = 0, mouseY = 0;
        window.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = (event.clientY / window.innerHeight) * 2 - 1;
        });

        function applyMouseToParticles() {
            if (isErupting) return;
            const pos = particles.geometry.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                pos[i*3] += mouseX * 0.0008;
                pos[i*3+2] += mouseY * 0.0008;
                if (Math.abs(pos[i*3]) > 1.6) pos[i*3] *= 0.99;
                if (Math.abs(pos[i*3+2]) > 1.6) pos[i*3+2] *= 0.99;
            }
            particles.geometry.attributes.position.needsUpdate = true;
        }

        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            rippleTime += 0.05;

            crystalGroup.rotation.y += 0.008;
            crystalGroup.rotation.x = Math.sin(time * 0.8) * 0.1;

            waterDisc.scale.setScalar(1 + Math.sin(rippleTime * 8) * 0.02);
            waterMat.emissiveIntensity = 0.4 + Math.sin(rippleTime * 6) * 0.2;

            if (!isErupting) {
                fountainGlow.intensity = 0.7 + Math.sin(time * 3) * 0.2;
                fountainGlow.color.setHex(0x00ccff);
                updateIdleParticles();
                applyMouseToParticles();
            } else {
                updateEruption();
            }

            stars.rotation.y += 0.0002;
            nebulaGroup.rotation.y += 0.0003;
            controls.update();
            composer.render();
        }

        animate();

        // Resize handler (fixed)
        function onResize() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            composer.setSize(w, h);
        }
        window.addEventListener('resize', onResize);
    </script>
</body>
</html>
